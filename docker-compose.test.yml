version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: traffboard-postgres-test
    environment:
      POSTGRES_DB: traffboard_test
      POSTGRES_USER: traffboard
      POSTGRES_PASSWORD: traffboard_test_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"  # Use different port to avoid conflicts
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    command: >
      postgres 
      -c log_statement=all 
      -c log_duration=on
      -c log_min_duration_statement=0
      -c shared_preload_libraries=pg_stat_statements
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffboard -d traffboard_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data: