name: 📢 CI/CD Notifications
run-name: 📢 Notifications for ${{ github.workflow }} by ${{ github.actor }}

on:
  workflow_run:
    workflows: ["🚀 CI/CD Pipeline"]
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  notify:
    name: 📢 Send Notifications
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📊 Get Workflow Results
        id: workflow-result
        run: |
          # Get workflow conclusion
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          COMMIT="${{ github.event.workflow_run.head_sha }}"
          ACTOR="${{ github.event.workflow_run.actor.login }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          
          echo "conclusion=$CONCLUSION" >> $GITHUB_OUTPUT
          echo "workflow_name=$WORKFLOW_NAME" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT:0:7}" >> $GITHUB_OUTPUT
          echo "actor=$ACTOR" >> $GITHUB_OUTPUT
          echo "run_url=$RUN_URL" >> $GITHUB_OUTPUT
          
          # Set status emoji and message
          if [ "$CONCLUSION" = "success" ]; then
            echo "status_emoji=✅" >> $GITHUB_OUTPUT
            echo "status_message=CI/CD Pipeline Successful" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          elif [ "$CONCLUSION" = "failure" ]; then
            echo "status_emoji=❌" >> $GITHUB_OUTPUT
            echo "status_message=CI/CD Pipeline Failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          elif [ "$CONCLUSION" = "cancelled" ]; then
            echo "status_emoji=🚫" >> $GITHUB_OUTPUT
            echo "status_message=CI/CD Pipeline Cancelled" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          else
            echo "status_emoji=⚠️" >> $GITHUB_OUTPUT
            echo "status_message=CI/CD Pipeline $CONCLUSION" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          fi

      - name: 📧 GitHub Issue Comment (for PRs)
        if: github.event.workflow_run.event == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const outputs = ${{ toJson(steps.workflow-result.outputs) }};
            const { conclusion, workflow_name, branch, commit, actor, run_url } = outputs;
            
            const statusEmoji = "${{ steps.workflow-result.outputs.status_emoji }}";
            const statusMessage = "${{ steps.workflow-result.outputs.status_message }}";
            
            const comment = `
            ${statusEmoji} **${statusMessage}**
            
            **Details:**
            - 🔧 Workflow: ${workflow_name}
            - 🌿 Branch: \`${branch}\`
            - 📝 Commit: \`${commit}\`
            - 👤 Actor: @${actor}
            - 🔗 [View Run](${run_url})
            
            _Automated notification from CI/CD pipeline_
            `;
            
            // Find PRs for this branch
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            
            // Comment on related PRs
            for (const pr of prs.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: comment
              });
            }

      - name: 📊 Create GitHub Workflow Summary
        if: always()
        run: |
          echo "## ${{ steps.workflow-result.outputs.status_emoji }} CI/CD Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.workflow-result.outputs.status_message }}" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ steps.workflow-result.outputs.workflow_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ steps.workflow-result.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ steps.workflow-result.outputs.commit }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** @${{ steps.workflow-result.outputs.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run URL:** ${{ steps.workflow-result.outputs.run_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Generated at $(date -u '+%Y-%m-%d %H:%M:%S UTC')_" >> $GITHUB_STEP_SUMMARY

      # Slack notification (optional - requires SLACK_WEBHOOK_URL secret)
      - name: 📱 Slack Notification
        uses: 8398a7/action-slack@v3
        continue-on-error: true
        with:
          status: ${{ steps.workflow-result.outputs.conclusion }}
          channel: '#ci-cd'
          username: 'GitHub Actions'
          icon_emoji: ':robot_face:'
          text: |
            ${{ steps.workflow-result.outputs.status_emoji }} **${{ steps.workflow-result.outputs.status_message }}**
            
            Repository: ${{ github.repository }}
            Branch: `${{ steps.workflow-result.outputs.branch }}`
            Commit: `${{ steps.workflow-result.outputs.commit }}`
            Actor: @${{ steps.workflow-result.outputs.actor }}
            
            [View Run](${{ steps.workflow-result.outputs.run_url }})
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # Email notification (optional - requires EMAIL setup)
      - name: 📧 Email Notification on Failure
        if: steps.workflow-result.outputs.conclusion == 'failure'
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ CI/CD Pipeline Failed - ${{ github.repository }}"
          body: |
            The CI/CD pipeline has failed for the TraffBoard project.
            
            Details:
            - Repository: ${{ github.repository }}
            - Branch: ${{ steps.workflow-result.outputs.branch }}
            - Commit: ${{ steps.workflow-result.outputs.commit }}
            - Actor: ${{ steps.workflow-result.outputs.actor }}
            - Workflow: ${{ steps.workflow-result.outputs.workflow_name }}
            
            Please check the workflow run for more details:
            ${{ steps.workflow-result.outputs.run_url }}
            
            This is an automated notification from GitHub Actions.
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions <noreply@github.com>
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}

      - name: ✅ Notification Complete
        run: |
          echo "🎉 Notifications sent successfully!"
          echo "Status: ${{ steps.workflow-result.outputs.conclusion }}"
          echo "All configured notification channels have been notified." 