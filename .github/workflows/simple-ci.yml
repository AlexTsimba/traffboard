name: ✅ Simple CI
run-name: ✅ Simple CI by ${{ github.actor }}

on:
  push:
    branches: 
      - refactor/*
  workflow_dispatch:

permissions:
  contents: read

env:
  PNPM_VERSION: '9'
  CI: true

jobs:
  simple-test:
    name: ✅ Simple Test (Node 20.x Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🚀 Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: 🔨 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📋 ESLint (simple)
        run: pnpm lint

      - name: 🔍 TypeScript check
        run: pnpm typecheck

      - name: 🧪 Tests
        run: pnpm test:run

      - name: ✅ Success
        run: echo "🎉 All checks passed!" 