name: 🧪 Simple Test
run-name: 🧪 Simple Test by ${{ github.actor }}

on:
  push:
    branches: 
      - refactor/infrastructure-setup
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Basic Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ✅ Simple Check
        run: |
          echo "✅ Basic test successful!"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}" 