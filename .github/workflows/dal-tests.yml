name: DAL Tests
run-name: 🧪 DAL Tests - ${{ github.actor }} - ${{ github.ref_name }}

on:
  push:
    branches:
      - main
      - develop
      - feature/*
      - fix/*
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

env:
  PNPM_VERSION: "9"
  CI: true
  FORCE_COLOR: 3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dal-tests:
    name: 🧪 DAL Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: traffboard_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/traffboard_test
      TEST_DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/traffboard_test
      NEXTAUTH_SECRET: test-secret-for-ci
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: test
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🚀 Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: 🔨 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🗄️ Setup test database
        run: |
          pnpm db:push
          pnpm db:seed

      - name: 🎭 Install Playwright
        run: npx playwright install --with-deps

      - name: 🏗️ Build application
        run: pnpm build

      - name: 🚀 Start application
        run: |
          pnpm start &
          sleep 10
          curl -f http://localhost:3000/api/health || exit 1

      - name: 🧪 Run DAL tests
        run: pnpm test:dal

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dal-test-results
          path: |
            test-results-dal/
            playwright-report-dal/
          retention-days: 7

      - name: 📈 Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dal-playwright-report
          path: playwright-report-dal/
          retention-days: 30
