name: Build & Test
run-name: 🚀 ${{ github.actor }} - ${{ github.ref_name }}

on:
  push:
    branches:
      - main
      - develop
      - refactor/*
      - feature/*
      - fix/*
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  security-events: write

env:
  PNPM_VERSION: "9"
  CI: true
  FORCE_COLOR: 3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Main CI job - Ubuntu + Node 20.x (primary development environment)
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: traffboard_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🚀 Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: 🔨 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏢 Generate database types
        run: pnpm db:generate

      - name: 🗄️ Setup test database
        run: pnpm db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/traffboard_test

      - name: 📋 Lint check
        run: pnpm lint

      - name: 🔍 Type check
        run: pnpm typecheck

      - name: 🧪 Run tests
        run: pnpm test:run
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/traffboard_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/traffboard_test

      - name: 🏗️ Build check
        run: pnpm build

  # E2E Testing job 
  e2e:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || contains(github.event.head_commit.message, '[e2e]')

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: traffboard_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🚀 Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: 🔨 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏢 Generate database types
        run: pnpm db:generate

      - name: 🗄️ Setup test database
        run: pnpm db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/traffboard_test

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: 🏗️ Build application
        run: pnpm build

      - name: 🧪 Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/traffboard_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/traffboard_test
          NEXTAUTH_SECRET: test-secret-for-ci-environment
          NEXTAUTH_URL: http://localhost:3000

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/results/
          retention-days: 7

  # Cross-platform compatibility check (only for main/develop branches)
  compatibility:
    name: 🔄 Compatibility (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🚀 Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: 🔨 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏢 Generate database types
        run: pnpm db:generate

      - name: 🧪 Quick test
        run: pnpm test:run

      - name: 🏗️ Build check
        run: pnpm build

  # Security scan (runs in parallel)
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🚀 Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: 🔨 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏢 Generate database types
        run: pnpm db:generate

      - name: 🔍 Dependency audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

  # Pre-deployment check (only for main branch - ready for DO deployment)
  pre-deploy:
    name: 🚀 Pre-deployment Check
    runs-on: ubuntu-latest
    needs: [ci, security]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🚀 Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: 🔨 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏢 Generate database types
        run: pnpm db:generate

      - name: 🏗️ Production build
        run: pnpm build
        env:
          NODE_ENV: production

      - name: ✅ Ready for DigitalOcean deployment
        run: |
          echo "🎉 Build successful! Ready for DigitalOcean deployment."
          echo "Build artifacts are ready for production deployment."
