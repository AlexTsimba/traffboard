name: 🧪 CI/CD Pipeline

on:
  push:
    branches: [main, master, develop, refactor/**]
  pull_request:
    branches: [main, master]
    
env:
  NODE_ENV: test
  PNPM_VERSION: 9
  # Performance optimizations
  CI: true
  FORCE_COLOR: 3
  # Disable telemetry for faster builds
  NEXT_TELEMETRY_DISABLED: 1
  DISABLE_OPENCOLLECTIVE: true

# Restrict permissions to minimum required (security best practice)
permissions:
  contents: read              # Read repository contents
  pull-requests: read         # Read PR information
  checks: write              # Write check results
  security-events: write     # Upload SARIF reports
  id-token: write           # OIDC token for cloud authentication
  actions: read             # Read workflow/action metadata

# Cancel previous runs for same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Matrix Testing - Core CI across multiple environments
  matrix-test:
    name: 🧪 Test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    strategy:
      fail-fast: false  # Continue testing other combinations even if one fails
      matrix:
        # Test on current LTS and latest stable Node.js versions
        node: ['18.x', '20.x']
        # For PRs: focus on Ubuntu (fastest), for main/master: test all platforms
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "windows-latest", "macos-latest"]') }}
    
        include:
          # Add specific test combinations for comprehensive coverage
          - node: '18.x'
            os: ubuntu-latest
            coverage: true  # Only generate coverage on one combination
          - node: '20.x'
            os: ubuntu-latest
            primary: true   # Mark as primary for deployment artifacts
    
    # Security: Restrict job permissions
    permissions:
      contents: read
      security-events: write
      checks: write
        
    outputs:
      coverage-generated: ${{ steps.coverage-check.outputs.generated }}
      build-artifacts: ${{ steps.build-check.outputs.artifacts }}
    
    steps:
      - name: 🔧 Checkout repository (security hardened)
        uses: actions/checkout@v4  # Pinned to major version for security
        with:
          fetch-depth: 0
          persist-credentials: false  # Don't persist Git credentials
          token: ${{ github.token }}  # Use GITHUB_TOKEN explicitly

      - name: 📦 Setup pnpm (security verified)
        uses: pnpm/action-setup@v4  # Pinned to major version
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
          # Security: Verify pnpm integrity
          standalone: true

      - name: 🚀 Setup Node.js ${{ matrix.node }} (security hardened)
        uses: actions/setup-node@v4  # Pinned to major version
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
          # Security: Always use official registry
          always-auth: true

      - name: 📁 Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: ⚡ Setup comprehensive pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            node_modules
          key: ${{ runner.os }}-${{ matrix.node }}-pnpm-comprehensive-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.node }}-pnpm-comprehensive-
            ${{ runner.os }}-pnpm-comprehensive-
            ${{ runner.os }}-pnpm-

      - name: 🔨 Install dependencies (optimized)
        run: |
          # Use parallel installation and prefer offline for speed
          pnpm install --frozen-lockfile --prefer-offline --reporter=append-only
        env:
          # Optimize pnpm performance
          NPM_CONFIG_PROGRESS: false
          NPM_CONFIG_AUDIT: false

      - name: 🎯 Setup build and tooling cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            .eslintcache
            .vitest
            node_modules/.cache
            ~/.npm
          key: ${{ runner.os }}-${{ matrix.node }}-build-tools-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx', '**/*.json', '**/eslint.config.*', '**/vitest.config.*', '**/tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.node }}-build-tools-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-${{ matrix.node }}-build-tools-
            ${{ runner.os }}-build-tools-

      # Enhanced Security Scanning Suite
      - name: 🛡️ Security audit (comprehensive)
        run: |
          # Generate detailed audit report
          pnpm audit --audit-level moderate --reporter=json > audit-results.json || true
          # Also generate human-readable report
          pnpm audit --audit-level moderate || true
          # Check for known vulnerabilities in dependencies
          npx audit-ci --config audit-ci.json || true
        continue-on-error: true

      - name: 🔎 Dependency vulnerability scan
        run: |
          # Scan for vulnerabilities using multiple tools
          echo "Scanning dependencies for security vulnerabilities..."
          # Check package.json for known vulnerable packages
          npx better-npm-audit audit || true
          # Scan for outdated packages with security implications
          pnpm outdated --format json > outdated-packages.json || true
        continue-on-error: true

      - name: 🔒 Upload security scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results-${{ matrix.node }}-${{ matrix.os }}
          path: |
            audit-results.json
            outdated-packages.json
          retention-days: 30

      - name: 📋 ESLint analysis (enhanced reporting)
        run: |
          # Run ESLint with multiple output formats for CI integration
          echo "Running ESLint analysis with enhanced reporting..."
          
          # Primary lint check with caching
          pnpm lint --cache --cache-location .eslintcache --format=compact
          
          # Generate detailed reports for CI
          pnpm lint --format=json --output-file eslint-results.json || true
          pnpm lint --format=junit --output-file eslint-junit.xml || true
          
          # Generate summary for GitHub
          echo "## 📋 ESLint Results" >> $GITHUB_STEP_SUMMARY
          
          # Check ESLint results and add to summary
          if [ -f "eslint-results.json" ]; then
            node -e "
              const fs = require('fs');
              try {
                const results = JSON.parse(fs.readFileSync('eslint-results.json', 'utf8'));
                const errorCount = results.reduce((sum, result) => sum + result.errorCount, 0);
                const warningCount = results.reduce((sum, result) => sum + result.warningCount, 0);
                const summary = fs.readFileSync(process.env.GITHUB_STEP_SUMMARY, 'utf8');
                const newSummary = summary + 
                  '- Errors: ' + errorCount + '\n' +
                  '- Warnings: ' + warningCount + '\n' +
                  '- Files checked: ' + results.length + '\n';
                fs.writeFileSync(process.env.GITHUB_STEP_SUMMARY, newSummary);
              } catch (e) { console.log('Could not parse ESLint results'); }
            " || true
          fi
          
          # Security-specific linting if config exists
          if [ -f "eslint.security.config.js" ]; then
            echo "Running security-specific ESLint checks..."
            npx eslint . --config eslint.security.config.js --format json --output-file eslint-security.json || true
          fi
        env:
          ESLINT_USE_FLAT_CONFIG: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: 🔍 TypeScript analysis (comprehensive)
        run: |
          if [ -f "tsconfig.json" ]; then
            echo "Running comprehensive TypeScript analysis..."
            
            # Generate build info for incremental compilation
            echo "## 🔍 TypeScript Results" >> $GITHUB_STEP_SUMMARY
            
            # Run TypeScript with detailed diagnostics
            echo "Running TypeScript type checking..."
            if pnpm run typecheck 2>&1 | tee ts-output.log; then
              echo "- ✅ Type checking: PASSED" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ Type checking: FAILED" >> $GITHUB_STEP_SUMMARY
              # Try with more detailed output
              npx tsc --noEmit --incremental --pretty --strict --listFiles --diagnostics 2>&1 | head -50 || true
            fi
            
            # Enhanced security and strict checks
            echo "Running strict TypeScript security checks..."
            npx tsc --noEmit --strict --noImplicitAny --noImplicitReturns --noFallthroughCasesInSwitch --noUncheckedIndexedAccess 2>&1 | tee ts-strict.log || true
            
            # Generate type coverage report if possible
            if command -v npx type-coverage > /dev/null 2>&1; then
              echo "Generating type coverage report..."
              npx type-coverage --detail --strict --ignoreFiles "**/*.test.*" --ignoreFiles "**/__tests__/**" > type-coverage.txt || true
              if [ -f "type-coverage.txt" ]; then
                echo "- 📊 Type coverage: $(cat type-coverage.txt | head -1)" >> $GITHUB_STEP_SUMMARY
              fi
            fi
            
            # Project statistics
            echo "Collecting TypeScript project statistics..."
            find . -name "*.ts" -o -name "*.tsx" | grep -v node_modules | wc -l | xargs echo "- 📁 TypeScript files:" >> $GITHUB_STEP_SUMMARY
            
          else
            echo "No tsconfig.json found, skipping TypeScript check"
            echo "- ⚠️ No tsconfig.json found" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      # Enhanced Test Execution with comprehensive reporting
      - name: 🧪 Vitest execution (comprehensive)
        run: |
          echo "Running comprehensive Vitest test suite..."
          
          # Create test results directory
          mkdir -p test-results
          
          # Run tests with multiple reporters for CI integration
          echo "## 🧪 Vitest Test Results" >> $GITHUB_STEP_SUMMARY
          
          # Execute tests with comprehensive reporting
          if pnpm test:run --reporter=verbose --reporter=json --outputFile=test-results/vitest-results.json --reporter=junit --outputFile=test-results/vitest-junit.xml --pool=threads 2>&1 | tee test-output.log; then
            echo "- ✅ Test execution: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Test execution: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Parse and display test statistics
          if [ -f "test-results/vitest-results.json" ]; then
            node -e "
              const fs = require('fs');
              try {
                const results = JSON.parse(fs.readFileSync('test-results/vitest-results.json', 'utf8'));
                const summary = fs.readFileSync(process.env.GITHUB_STEP_SUMMARY, 'utf8');
                
                let stats = '';
                if (results.testResults) {
                  const passed = results.testResults.filter(t => t.status === 'passed').length;
                  const failed = results.testResults.filter(t => t.status === 'failed').length;
                  const skipped = results.testResults.filter(t => t.status === 'skipped').length;
                  const total = results.testResults.length;
                  
                  stats += '- ✅ Passed: ' + passed + '\n';
                  stats += '- ❌ Failed: ' + failed + '\n';
                  stats += '- ⏭️ Skipped: ' + skipped + '\n';
                  stats += '- 📊 Total: ' + total + '\n';
                  
                  if (results.startTime && results.endTime) {
                    const duration = (results.endTime - results.startTime) / 1000;
                    stats += '- ⏱️ Duration: ' + duration.toFixed(2) + 's\n';
                  }
                }
                
                fs.writeFileSync(process.env.GITHUB_STEP_SUMMARY, summary + stats);
              } catch (e) { console.log('Could not parse test results'); }
            " || true
          fi
          
          # Test performance analysis
          echo "Analyzing test performance..."
          if [ -f "test-output.log" ]; then
            # Extract slow tests
            grep -i "slow" test-output.log || echo "No slow tests detected"
          fi
          
        env:
          VITEST_CACHE_DIR: .vitest
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITEST_POOL_SIZE: 4
          CI: true

      # Enhanced Coverage Analysis with thresholds
      - name: 📊 Coverage analysis (with thresholds)
        if: matrix.coverage == true
        run: |
          echo "Generating comprehensive test coverage analysis..."
          
          # Create coverage directory
          mkdir -p coverage
          
          # Generate coverage with multiple formats
          echo "## 📊 Coverage Analysis" >> $GITHUB_STEP_SUMMARY
          
          if pnpm test:coverage --reporter=verbose --pool=threads --coverage.reporter=text --coverage.reporter=json --coverage.reporter=html --coverage.reporter=lcov 2>&1 | tee coverage-output.log; then
            echo "- ✅ Coverage generation: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Coverage generation: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Parse coverage results and check thresholds
          if [ -f "coverage/coverage-summary.json" ]; then
            node -e "
              const fs = require('fs');
              try {
                const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
                const summary = fs.readFileSync(process.env.GITHUB_STEP_SUMMARY, 'utf8');
                
                const total = coverage.total;
                let coverageStats = '';
                
                coverageStats += '- 🔢 Lines: ' + total.lines.pct + '%\n';
                coverageStats += '- 🌿 Branches: ' + total.branches.pct + '%\n';
                coverageStats += '- 🔩 Functions: ' + total.functions.pct + '%\n';
                coverageStats += '- 📄 Statements: ' + total.statements.pct + '%\n';
                
                // Coverage thresholds (adjust as needed)
                const thresholds = { lines: 80, branches: 70, functions: 80, statements: 80 };
                let allPassed = true;
                
                Object.entries(thresholds).forEach(([key, threshold]) => {
                  const actual = total[key].pct;
                  const status = actual >= threshold ? '✅' : '❌';
                  coverageStats += '- ' + status + ' ' + key + ' threshold (' + threshold + '%): ' + actual + '%\n';
                  if (actual < threshold) allPassed = false;
                });
                
                if (allPassed) {
                  coverageStats += '\n🎉 All coverage thresholds met!\n';
                } else {
                  coverageStats += '\n⚠️ Some coverage thresholds not met\n';
                }
                
                fs.writeFileSync(process.env.GITHUB_STEP_SUMMARY, summary + coverageStats);
              } catch (e) { console.log('Could not parse coverage results'); }
            " || true
          fi
          
          # Generate coverage badge data
          if [ -f "coverage/coverage-summary.json" ]; then
            echo "Generating coverage badge data..."
            node -e "
              const fs = require('fs');
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const badge = {
                schemaVersion: 1,
                label: 'coverage',
                message: coverage.total.lines.pct + '%',
                color: coverage.total.lines.pct >= 80 ? 'brightgreen' : coverage.total.lines.pct >= 60 ? 'yellow' : 'red'
              };
              fs.writeFileSync('coverage/coverage-badge.json', JSON.stringify(badge, null, 2));
            " || true
          fi
          
        env:
          VITEST_CACHE_DIR: .vitest
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITEST_POOL_SIZE: 4
          CI: true
        continue-on-error: false

      - name: 📈 Upload enhanced test artifacts
        if: matrix.coverage == true
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-node${{ matrix.node }}-${{ matrix.os }}
          path: |
            coverage/
            test-results/
            eslint-results.json
            eslint-junit.xml
            ts-output.log
            type-coverage.txt
            test-output.log
            coverage-output.log
          retention-days: 14

      - name: ✅ Set test integration outputs
        id: coverage-check
        if: matrix.coverage == true
        run: |
          echo "generated=true" >> $GITHUB_OUTPUT
          
          # Set additional outputs for downstream jobs
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE_PCT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.lines.pct)")
            echo "coverage-percentage=$COVERAGE_PCT" >> $GITHUB_OUTPUT
          fi
          
          if [ -f "eslint-results.json" ]; then
            ERROR_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('eslint-results.json', 'utf8')).reduce((sum, result) => sum + result.errorCount, 0))")
            echo "eslint-errors=$ERROR_COUNT" >> $GITHUB_OUTPUT
          fi

      # Build (optimized for production)
      - name: 🏗️ Build application (production optimized)
        run: |
          # Build with all optimizations enabled
          pnpm build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          # Next.js performance optimizations
          NEXT_CACHE_HANDLER: default
          # Enable SWC optimizations
          NEXT_SWCOPT: true
          # Increase memory for large builds
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: 📦 Upload build artifacts
        if: matrix.primary == true
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-node${{ matrix.node }}-${{ matrix.os }}
          path: |
            .next/
            !.next/cache
          retention-days: 7

      - name: ✅ Set build output
        id: build-check
        if: matrix.primary == true
        run: echo "artifacts=true" >> $GITHUB_OUTPUT

      # Security: Scan build artifacts for vulnerabilities
      - name: 🔍 Build security validation
        if: matrix.primary == true
        run: |
          echo "Validating build security..."
          # Check for sensitive data in build
          if [ -d ".next" ]; then
            echo "Scanning Next.js build for sensitive data..."
            # Look for potential secrets in build files
            grep -r -i "password\|secret\|key\|token" .next/ || echo "No obvious secrets found in build"
            # Check build size for anomalies
            du -sh .next/ | awk '{print "Build size: " $1}'
          fi
        continue-on-error: true

  # Summary Job
  ci-success:
    name: ✅ CI Matrix Results
    runs-on: ubuntu-latest
    needs: [matrix-test]
    if: always()
    steps:
      - name: 🔧 Checkout repository (for analysis)
        uses: actions/checkout@v4

      - name: 📊 Matrix Results Summary
        run: |
          echo "## 🧪 Matrix Testing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Node.js Versions Tested:" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js 18.x" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js 20.x" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Platforms Tested:" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "- Ubuntu Latest (PR mode - faster feedback)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Ubuntu Latest" >> $GITHUB_STEP_SUMMARY
            echo "- Windows Latest" >> $GITHUB_STEP_SUMMARY
            echo "- macOS Latest" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
      - name: ✅ All matrix jobs passed
        if: ${{ needs.matrix-test.result == 'success' }}
        run: |
          echo "🎉 All matrix combinations passed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "✅ Project is compatible across all tested environments."
        
      - name: ❌ Some matrix jobs failed
        if: ${{ needs.matrix-test.result == 'failure' }}
        run: |
          echo "❌ Some matrix combinations failed. Check individual job logs above." >> $GITHUB_STEP_SUMMARY
          echo "❌ Matrix testing pipeline failed. Check the logs above."
          exit 1

      - name: ⚠️ Matrix jobs cancelled or skipped
        if: ${{ needs.matrix-test.result == 'cancelled' || needs.matrix-test.result == 'skipped' }}
        run: |
          echo "⚠️ Matrix jobs were cancelled or skipped." >> $GITHUB_STEP_SUMMARY
          echo "⚠️ Matrix testing was cancelled or skipped." 