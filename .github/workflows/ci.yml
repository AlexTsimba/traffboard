name: 🧪 CI/CD Pipeline
run-name: 🚀 ${{ github.actor }} testing CI/CD Pipeline

on:
  push:
    branches: 
      - main
      - master
      - develop
      - staging
      - refactor/*
      - feature/*
      - fix/*
      - hotfix/*
  pull_request:
    branches: 
      - main
      - master
      - develop
  workflow_dispatch:

# Global permissions for security
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  issues: write
  security-events: write
  id-token: write  # OIDC support

# Performance and resource management
env:
  PNPM_VERSION: '9'
  CI: true
  FORCE_COLOR: 3
  NPM_CONFIG_PROGRESS: false
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Concurrency management
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 Test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x']
        os: ['ubuntu-latest']

    steps:
      - name: 🔒 Harden GitHub Actions Runner
        run: |
          set -euo pipefail
          echo "🔒 Hardening runner environment..."
          sudo apt-get update -qq && sudo apt-get install -y curl unzip
          
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🚀 Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: 🔨 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run tests
        run: pnpm test:run
        
      - name: 📋 Run ESLint
        run: pnpm lint
        
      - name: 🔍 TypeScript check
        run: pnpm typecheck 