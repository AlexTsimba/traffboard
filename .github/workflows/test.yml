name: 🧪 Debug Tests
run-name: 🔍 Debug testing by ${{ github.actor }}

on:
  push:
    branches: 
      - refactor/*
  workflow_dispatch:

permissions:
  contents: read

env:
  PNPM_VERSION: '9'
  CI: true

jobs:
  debug-test:
    name: 🧪 Debug Test (Node 20.x)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🚀 Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: 🔨 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📋 Check ESLint
        run: pnpm lint

      - name: 🔍 Check TypeScript
        run: pnpm typecheck

      - name: 🧪 Run tests with debug
        run: |
          echo "=== Running tests with debug output ==="
          pnpm test:run --reporter=verbose
          echo "=== Test completed ===" 