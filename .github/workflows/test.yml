name: 🧪 Debug Tests
run-name: 🔍 Debug testing by ${{ github.actor }}

on:
  push:
    branches: 
      - refactor/*
  workflow_dispatch:

permissions:
  contents: read

env:
  PNPM_VERSION: '9'
  CI: true

jobs:
  debug-test:
    name: 🧪 Debug Test (Node 20.x)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🚀 Setup Node.js 20.x (no cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🔍 Debug environment
        run: |
          echo "=== Environment ==="
          node --version
          npm --version
          pnpm --version
          echo "=== Package.json exists? ==="
          ls -la package.json
          echo "=== Lockfile exists? ==="
          ls -la pnpm-lock.yaml
          echo "=== Workspace structure ==="
          find . -name "package.json" -type f | head -10

      - name: 🔨 Install dependencies (with debug)
        run: |
          echo "=== Starting pnpm install with debug ==="
          pnpm install --frozen-lockfile --reporter=append-only --loglevel=debug 2>&1 | tee install.log || {
            echo "=== PNPM INSTALL FAILED ==="
            echo "Exit code: $?"
            echo "=== Last 50 lines of output ==="
            tail -50 install.log
            echo "=== Checking for common issues ==="
            pnpm config list
            echo "=== Registry check ==="
            pnpm config get registry
            exit 1
          }

      - name: 🧪 Run simple test
        run: |
          echo "=== Environment info ==="
          node --version
          npm --version
          pnpm --version
          echo "=== Running tests ==="
          pnpm test:run 