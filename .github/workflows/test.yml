name: 🧪 Debug Tests
run-name: 🔍 Debug testing by ${{ github.actor }}

on:
  push:
    branches: 
      - refactor/*
  workflow_dispatch:

permissions:
  contents: read

env:
  PNPM_VERSION: '9'
  CI: true

jobs:
  debug-test:
    name: 🧪 Debug Test (Node 20.x)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🚀 Setup Node.js 20.x (no cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          # Убираем cache для диагностики

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🔨 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run simple test
        run: |
          echo "=== Environment info ==="
          node --version
          npm --version
          pnpm --version
          echo "=== Running tests ==="
          pnpm test:run 